<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hemu Ji Chilla Chat Bhandar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ================= NAVBAR ================= -->
    <header class="navbar">
        <div class="logo">
            <h2>Hemu Ji Chilla Chat</h2>
        </div>

        <div class="nav-controls">
            <select id="branchSelect">
                <option value="madhav">Madhav Ganj Branch</option>
                <option value="nai">Nai Sadak Branch</option>
            </select>

            <button id="themeToggle">🌙</button>
        </div>
    </header>


    <!-- ================= HERO SECTION ================= -->
    <section class="hero">
        <div class="hero-box">
            <h1>Hemu Ji Chilla</h1>
            <p>Serving the authentic taste of Gwalior since 33+ years ❤️</p>

            <button 
                class="primary-btn"
                onclick="document.getElementById('menuSection').scrollIntoView({behavior:'smooth'})">
                View Menu
            </button>
        </div>
    </section>


    <!-- ================= MENU SECTION ================= -->
    <section id="menuSection" class="menu-section">
        <div class="container">
            <h2 class="section-title">Our Special Menu</h2>
            <div id="menuContainer"></div>
        </div>
    </section>


    <!-- ================= FOOTER ================= -->
    <footer class="footer">
        <p>© 2026 Hemu Ji Chilla Chat Bhandar | Made with ❤️ in Gwalior</p>
    </footer>


    <!-- ================= JAVASCRIPT ================= -->
    <script src="script.js" defer></script>

</body>
</html>
