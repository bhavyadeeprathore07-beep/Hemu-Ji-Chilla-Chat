<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hemu Ji Chilla & Chat</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>
<body>

<header class="navbar glass">
    <h2 class="logo">Hemu Ji</h2>

    <div class="nav-right">
        <select id="branchSelect">
            <option value="chilla">Chilla Branch</option>
            <option value="chat">Chat Branch</option>
        </select>

        <button id="themeToggle">🌙</button>
    </div>
</header>

<section class="hero">
    <div class="hero-content glass">
        <h1 id="branchTitle">Hemu Ji Chilla</h1>
        <p>Serving Gwalior Since 33 Years ❤️</p>
        <button onclick="scrollToMenu()">View Menu</button>
    </div>
</section>

<section id="menu" class="menu-section">
    <h2>Our Special Menu</h2>
    <div class="menu-container" id="menuContainer">
        <!-- JS will inject items -->
    </div>
</section>

<footer>
    <p>© 2026 Hemu Ji Street Food | Made with ❤️ in Gwalior</p>
</footer>

<script src="script.js"></script>
</body>
</html>
